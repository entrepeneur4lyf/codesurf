<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>API Proxy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ct-bg: transparent; --ct-panel: rgba(0,0,0,0.04); --ct-panel-2: rgba(0,0,0,0.06); --ct-panel-3: rgba(0,0,0,0.09);
      --ct-border: rgba(0,0,0,0.10); --ct-border-2: rgba(0,0,0,0.16); --ct-text: #111111; --ct-muted: #475569; --ct-dim: #64748b;
      --ct-accent: #4f46e5; --ct-accent-s: rgba(79,70,229,0.12);
      --ct-success: #1f8f5f; --ct-warning: #c07b12; --ct-danger: #dc2626;
      --bg: var(--ct-bg); --surface: var(--ct-panel); --surface2: var(--ct-panel-2); --surface3: var(--ct-panel-3);
      --border: var(--ct-border); --text: var(--ct-text); --muted: var(--ct-dim);
      --accent: var(--ct-accent); --accent-bg: var(--ct-accent-s);
      --green: var(--ct-success); --green-bg: color-mix(in srgb, var(--ct-success) 14%, transparent);
      --amber: var(--ct-warning); --amber-bg: color-mix(in srgb, var(--ct-warning) 14%, transparent);
      --red: var(--ct-danger); --red-bg: color-mix(in srgb, var(--ct-danger) 12%, transparent);
    }
    html[data-ct-mode="light"] {
      --ct-muted: #334155;
      --ct-dim: #64748b;
      --ct-border-2: rgba(15,23,42,0.18);
    }
    html, body { height:100%; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      font-size:13px; overflow:hidden; display:flex; flex-direction:column; }

    /* toolbar */
    .bar { display:flex; align-items:center; gap:8px; padding:8px 12px;
      border-bottom:1px solid var(--border); flex-shrink:0; height:44px; }
    .bar-title { font-weight:600; font-size:13px; }
    .spacer { flex:1; }
    .status-pill { display:flex; align-items:center; gap:5px; font-size:11px;
      padding:3px 9px; border-radius:10px; font-weight:600; }
    .status-pill.running { background:var(--green-bg); color:var(--green); }
    .status-pill.stopped { background:var(--red-bg); color:var(--red); }
    .status-pill.unknown { background:var(--surface2); color:var(--muted); }
    .status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }
    .status-pill.running .status-dot { animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* url banner */
    .url-banner { display:flex; align-items:center; gap:8px; padding:8px 12px;
      background:var(--accent-bg); border-bottom:1px solid rgba(129,140,248,0.2); flex-shrink:0; }
    .url-text { font-family:monospace; font-size:12px; color:var(--accent); flex:1;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .url-banner.disabled .url-text { color:var(--muted); }
    .btn-copy { background:var(--surface2); border:1px solid var(--border); border-radius:5px;
      color:var(--text); font-size:11px; font-family:inherit; padding:3px 10px;
      cursor:pointer; white-space:nowrap; transition:border-color .15s; flex-shrink:0; }
    .btn-copy:hover { border-color:var(--ct-border-2); background: var(--surface3); }
    .btn-copy.ok { border-color:var(--green); color:var(--green); }

    /* scroll area */
    .scroll { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
    .scroll::-webkit-scrollbar { width:4px; }
    .scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

    /* sections */
    .section { background:var(--surface); border:1px solid var(--border); border-radius:8px;
      overflow:hidden; }
    .section-head { display:flex; align-items:center; justify-content:space-between;
      padding:8px 12px; border-bottom:1px solid var(--border); }
    .section-title { font-size:11px; font-weight:600; color:var(--muted);
      text-transform:uppercase; letter-spacing:.04em; }
    .section-body { padding:12px; display:flex; flex-direction:column; gap:10px; }

    /* fields */
    .field { display:flex; flex-direction:column; gap:5px; }
    .field-row { display:flex; align-items:center; gap:8px; }
    .label { font-size:11px; color:var(--muted); }
    .input {
      background:var(--surface2); border:1px solid var(--border); border-radius:6px;
      color:var(--text); font-size:12px; font-family:inherit; padding:6px 10px;
      outline:none; transition:border-color .15s; width:100%;
    }
    .input:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-bg); }
    .input.mono { font-family:monospace; }
    .input[type=number] { width:100px; }

    /* toggle */
    .toggle-wrap { display:flex; align-items:center; gap:8px; }
    .toggle { position:relative; width:36px; height:20px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-track {
      position:absolute; inset:0; background:var(--surface3); border:1px solid var(--border); border-radius:10px;
      cursor:pointer; transition:background .2s;
    }
    .toggle input:checked + .toggle-track { background:var(--accent); }
    .toggle-thumb {
      position:absolute; top:2px; left:2px; width:16px; height:16px;
      background:#fff; border-radius:50%; transition:transform .2s; pointer-events:none;
    }
    .toggle input:checked ~ .toggle-thumb { transform:translateX(16px); }
    .toggle-label { font-size:12px; cursor:pointer; }

    /* allowlist */
    .allow-list { display:flex; flex-direction:column; gap:5px; }
    .allow-row { display:flex; align-items:center; gap:6px; padding:5px 8px;
      background:var(--surface2); border-radius:5px; }
    .allow-host { font-size:12px; font-family:monospace; flex:1; color:var(--text); }
    .allow-del { background:none; border:none; color:var(--muted); cursor:pointer;
      font-size:12px; padding:1px 5px; border-radius:3px; transition:color .15s; }
    .allow-del:hover { color:var(--red); }
    .allow-add { display:flex; gap:6px; }
    .btn-add-host { background:var(--accent-bg); border:1px solid rgba(129,140,248,.3);
      border-radius:5px; color:var(--accent); font-size:12px; font-family:inherit;
      padding:5px 12px; cursor:pointer; white-space:nowrap; transition:opacity .15s; }
    .btn-add-host:hover { opacity:.8; }

    /* connections */
    .conn-list { display:flex; flex-direction:column; gap:5px; }
    .conn-row { display:flex; align-items:center; gap:8px; padding:6px 8px;
      background:var(--surface2); border-radius:5px; }
    .conn-dot { width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0; }
    .conn-info { flex:1; font-size:11px; }
    .conn-host { color:var(--text); font-family:monospace; }
    .conn-model { color:var(--muted); font-size:10px; }
    .conn-reqs { font-size:10px; color:var(--muted); }
    .no-conns { font-size:11px; color:var(--muted); padding:8px 0; text-align:center; }

    /* save button */
    .save-row { padding:0 12px 12px; }
    .btn-save { width:100%; background:var(--accent); color:#fff; border:none;
      border-radius:6px; padding:8px; font-size:12px; font-family:inherit;
      cursor:pointer; font-weight:600; transition:opacity .15s; }
    .btn-save:hover { opacity:.85; }
    .btn-save:disabled { opacity:.4; cursor:default; }

    /* stat badges */
    .stat-row { display:flex; gap:8px; flex-wrap:wrap; }
    .stat { background:var(--surface2); border-radius:6px; padding:6px 10px;
      display:flex; flex-direction:column; gap:2px; flex:1; min-width:80px; }
    .stat-val { font-size:16px; font-weight:700; color:var(--text); }
    .stat-lbl { font-size:10px; color:var(--muted); }
  </style>
</head>
<body>

<!-- Toolbar -->
<div class="bar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M4.93 4.93a10 10 0 0 0 0 14.14"/>
    <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
    <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
  </svg>
  <span class="bar-title">API Proxy</span>
  <div class="spacer"></div>
  <div id="statusPill" class="status-pill unknown">
    <span class="status-dot"></span>
    <span id="statusLabel">Unknown</span>
  </div>
</div>

<!-- URL banner -->
<div class="url-banner disabled" id="urlBanner">
  <span id="urlText" class="url-text">http://localhost:1337/v1</span>
  <button class="btn-copy" id="copyUrl">Copy URL</button>
</div>

<!-- Scroll area -->
<div class="scroll">

  <!-- General -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">General</span>
    </div>
    <div class="section-body">
      <div class="field">
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="toggleEnabled" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
          <span class="toggle-label">Enable proxy server</span>
        </div>
      </div>
      <div class="field">
        <div class="label">Port</div>
        <div class="field-row">
          <input type="number" class="input" id="portInput" min="1024" max="65535" value="1337" />
          <span class="label" style="color:var(--muted);font-size:11px;">default 1337</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Authentication</span>
    </div>
    <div class="section-body">
      <div class="field">
        <div class="label">API Key (optional — leave blank to allow all)</div>
        <div class="field-row">
          <input type="password" class="input mono" id="apiKeyInput" placeholder="sk-..." />
          <button class="btn-copy" id="copyKey" style="flex-shrink:0">Copy</button>
        </div>
        <button class="btn-add-host" id="genKeyBtn" style="align-self:flex-start;margin-top:2px;">Generate key</button>
      </div>
    </div>
  </div>

  <!-- Allowlist -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Host Allowlist</span>
      <span id="allowCount" class="label">0 hosts</span>
    </div>
    <div class="section-body">
      <div id="allowList" class="allow-list"></div>
      <div class="allow-add">
        <input type="text" class="input mono" id="hostInput" placeholder="localhost, 192.168.1.0/24, *" style="flex:1" />
        <button class="btn-add-host" id="addHostBtn">Add</button>
      </div>
      <div class="label" style="font-size:10px;">Use * to allow all hosts. Leave empty to restrict to localhost only.</div>
    </div>
  </div>

  <!-- Status -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Status</span>
      <button class="btn-copy" id="refreshBtn">Refresh</button>
    </div>
    <div class="section-body">
      <div class="stat-row">
        <div class="stat">
          <span class="stat-val" id="statConns">—</span>
          <span class="stat-lbl">Active connections</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="statReqs">—</span>
          <span class="stat-lbl">Requests served</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="statUptime">—</span>
          <span class="stat-lbl">Uptime</span>
        </div>
      </div>
      <div id="connList" class="conn-list"></div>
    </div>
  </div>

</div>

<!-- Save -->
<div class="save-row">
  <button class="btn-save" id="saveBtn">Save Configuration</button>
</div>

<script>
(function() {
'use strict'
const TID = (new URLSearchParams(location.search)).get('tileId') || 'api-proxy'

let bridge = null
let cfg = { port: 1337, apiKey: '', allowedHosts: ['localhost', '127.0.0.1'], enabled: false, models: [] }
let pollTimer = null

/* ── Bridge ── */
function initBridge(b) {
  bridge = b
  b.tile.getState('api-proxy-cfg').then(s => {
    if (s && typeof s === 'object') {
      cfg = Object.assign(cfg, s)
      applyConfig()
    }
  }).catch(() => {}).finally(() => {
    hydrateModelsFromPeers()
    if (bridge.context && bridge.context.onPeerContextChanged) {
      bridge.context.onPeerContextChanged(function(data) {
        if (!data || !data.key) return
        if (data.key.indexOf('ctx:models:') === 0 || data.key.indexOf('ctx:model-hub:') === 0) {
          hydrateModelsFromPeers()
        }
      })
    }
    pollStatus()
  })
}
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'contex-bridge-ready') initBridge(e.data.bridge || window.contex)
  if (e.data && e.data.type === 'contex-action-invoke') onAction(e.data)
})
if (window.contex) initBridge(window.contex)

/* ── Actions ── */
function onAction(msg) {
  if (msg.action === 'configure') {
    const p = msg.params || {}
    if (p.port !== undefined) cfg.port = parseInt(p.port) || cfg.port
    if (p.apiKey !== undefined) cfg.apiKey = p.apiKey
    if (p.enabled !== undefined) cfg.enabled = Boolean(p.enabled)
    if (Array.isArray(p.models)) cfg.models = p.models
    applyConfig(); saveConfig()
  }
  if (msg.action === 'getUrl') {
    const url = 'http://localhost:' + cfg.port + '/v1'
    if (msg.requestId) {
      window.parent.postMessage({
        type: 'contex-action-result', tileId: TID, requestId: msg.requestId, result: { url }
      }, '*')
      return
    }
  }
  if (msg.requestId) {
    window.parent.postMessage({type:'contex-action-result',tileId:TID,requestId:msg.requestId,result:'ok'},'*')
  }
}

/* ── Config ── */
function applyConfig() {
  document.getElementById('toggleEnabled').checked = cfg.enabled
  document.getElementById('portInput').value = cfg.port
  document.getElementById('apiKeyInput').value = cfg.apiKey || ''
  updateUrlBanner()
  renderAllowList()
}

function readConfig() {
  cfg.enabled = document.getElementById('toggleEnabled').checked
  cfg.port = parseInt(document.getElementById('portInput').value) || 1337
  cfg.apiKey = document.getElementById('apiKeyInput').value.trim()
}

function saveConfig() {
  if (!bridge) return
  bridge.tile.setState('api-proxy-cfg', cfg).catch(() => {})
  bridge.context.set('ctx:api-proxy:config', {
    port: cfg.port,
    url: 'http://localhost:' + cfg.port + '/v1',
    apiKey: cfg.apiKey,
    enabled: cfg.enabled,
    models: cfg.models
  }).catch(() => {})
  bridge.context.set('ctx:chat:providers', buildChatProviders()).catch(() => {})
}

function normalizeInferenceModel(model) {
  if (!model || typeof model !== 'object') return null
  var modelId = typeof model.modelId === 'string' ? model.modelId.trim() : ''
  if (!modelId && typeof model.id === 'string') modelId = model.id.trim()
  if (!modelId) return null
  return {
    modelId: modelId,
    name: typeof model.name === 'string' && model.name.trim() ? model.name.trim() : modelId,
    size: typeof model.size === 'string' ? model.size : '',
    source: typeof model.source === 'string' ? model.source : 'extension',
  }
}

function extractInferenceModels(peerMap) {
  var byId = {}
  var keys = Object.keys(peerMap || {})
  keys.forEach(function(peerId) {
    var entries = peerMap[peerId] || []
    if (!Array.isArray(entries)) return
    entries.forEach(function(entry) {
      if (!entry || !entry.key) return
      if (entry.key === 'ctx:models:inference-models' || entry.key === 'ctx:model-hub:inference-models') {
        if (!Array.isArray(entry.value)) return
        entry.value.forEach(function(item) {
          var normalized = normalizeInferenceModel(item)
          if (normalized) byId[normalized.modelId] = normalized
        })
      }
      if (entry.key === 'ctx:models:active-model' || entry.key === 'ctx:model-hub:selected') {
        var normalizedSingle = normalizeInferenceModel(entry.value)
        if (normalizedSingle) byId[normalizedSingle.modelId] = normalizedSingle
      }
    })
  })
  return Object.keys(byId).sort().map(function(id) { return byId[id] })
}

function sameModelList(a, b) {
  if (!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false
  for (var i = 0; i < a.length; i++) {
    if (!a[i] || !b[i]) return false
    if (a[i].modelId !== b[i].modelId || a[i].name !== b[i].name || a[i].size !== b[i].size) return false
  }
  return true
}

function hydrateModelsFromPeers() {
  if (!bridge || !bridge.context || !bridge.context.getAllPeerContext) return
  bridge.context.getAllPeerContext('ctx:').then(function(map) {
    var inferred = extractInferenceModels(map)
    if (sameModelList(cfg.models, inferred)) return
    cfg.models = inferred
    if (cfg.models.length > 0) cfg.enabled = true
    saveConfig()
  }).catch(() => {})
}

function buildChatProviders() {
  if (!Array.isArray(cfg.models) || cfg.models.length === 0) return []
  var baseUrl = 'http://localhost:' + cfg.port + '/v1'
  return cfg.models.map(function(model) {
    var modelId = model.modelId || model.id
    var label = 'Proxy:' + modelId
    return {
      id: 'proxy:' + TID + ':' + modelId,
      label: label,
      description: 'Local API proxy · ' + (model.name || modelId) + ' · ' + baseUrl,
      noun: 'model',
      icon: 'server',
      models: [{
        id: modelId,
        label: model.name || modelId,
        description: model.size ? 'Estimated footprint ' + model.size : undefined,
      }],
      transport: {
        type: 'local-proxy',
        baseUrl: baseUrl,
        apiKey: cfg.apiKey || 'sk-contex-local',
        autoStart: true,
      },
    }
  })
}

/* ── URL banner ── */
function updateUrlBanner() {
  const url = 'http://localhost:' + cfg.port + '/v1'
  document.getElementById('urlText').textContent = url
  const banner = document.getElementById('urlBanner')
  banner.className = 'url-banner' + (cfg.enabled ? '' : ' disabled')
}

/* ── Allowlist ── */
function renderAllowList() {
  const list = document.getElementById('allowList')
  while (list.firstChild) list.removeChild(list.firstChild)
  document.getElementById('allowCount').textContent = cfg.allowedHosts.length + ' host' + (cfg.allowedHosts.length !== 1 ? 's' : '')

  if (!cfg.allowedHosts.length) {
    const msg = document.createElement('div')
    msg.className = 'no-conns'
    msg.textContent = 'No hosts — proxy will reject all connections'
    list.appendChild(msg)
    return
  }

  cfg.allowedHosts.forEach((host, i) => {
    const row = document.createElement('div')
    row.className = 'allow-row'
    const hostEl = document.createElement('span')
    hostEl.className = 'allow-host'
    hostEl.textContent = host
    const del = document.createElement('button')
    del.className = 'allow-del'
    del.textContent = 'x'
    del.title = 'Remove'
    del.addEventListener('click', () => {
      cfg.allowedHosts = cfg.allowedHosts.filter((_, j) => j !== i)
      renderAllowList()
    })
    row.appendChild(hostEl)
    row.appendChild(del)
    list.appendChild(row)
  })
}

document.getElementById('addHostBtn').addEventListener('click', addHost)
document.getElementById('hostInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHost() })

function addHost() {
  const val = document.getElementById('hostInput').value.trim()
  if (!val || cfg.allowedHosts.includes(val)) return
  cfg.allowedHosts.push(val)
  document.getElementById('hostInput').value = ''
  renderAllowList()
}

/* ── Status polling ── */
async function pollStatus() {
  if (!bridge) return
  try {
    const s = await bridge.ext.invoke('getStatus')
    if (s && typeof s === 'object') {
      setRunning(s.running === true)
      document.getElementById('statConns').textContent = s.connections ?? 0
      document.getElementById('statReqs').textContent = s.requests ?? 0
      document.getElementById('statUptime').textContent = s.uptime ? fmtUptime(s.uptime) : '—'
      renderConnections(s.activeConnections || [])
    } else {
      setRunning(false)
    }
  } catch (e) {
    setStopped()
  }
  if (cfg.enabled) {
    clearTimeout(pollTimer)
    pollTimer = setTimeout(pollStatus, 5000)
  }
}

function setRunning(yes) {
  const pill = document.getElementById('statusPill')
  const lbl = document.getElementById('statusLabel')
  pill.className = 'status-pill ' + (yes ? 'running' : 'stopped')
  lbl.textContent = yes ? 'Running' : 'Stopped'
}

function setStopped() {
  const pill = document.getElementById('statusPill')
  const lbl = document.getElementById('statusLabel')
  pill.className = 'status-pill stopped'
  lbl.textContent = 'Not running'
  document.getElementById('statConns').textContent = '0'
  document.getElementById('statReqs').textContent = '—'
  document.getElementById('statUptime').textContent = '—'
  renderConnections([])
}

function renderConnections(conns) {
  const list = document.getElementById('connList')
  while (list.firstChild) list.removeChild(list.firstChild)
  if (!conns.length) {
    const m = document.createElement('div')
    m.className = 'no-conns'
    m.textContent = cfg.enabled ? 'No active connections' : 'Proxy is disabled'
    list.appendChild(m)
    return
  }
  conns.forEach(c => {
    const row = document.createElement('div')
    row.className = 'conn-row'
    const dot = document.createElement('span')
    dot.className = 'conn-dot'
    const info = document.createElement('div')
    info.className = 'conn-info'
    const host = document.createElement('div')
    host.className = 'conn-host'
    host.textContent = c.host || 'unknown'
    const model = document.createElement('div')
    model.className = 'conn-model'
    model.textContent = c.model || ''
    info.appendChild(host)
    if (c.model) info.appendChild(model)
    const reqs = document.createElement('span')
    reqs.className = 'conn-reqs'
    reqs.textContent = (c.requests || 0) + ' req'
    row.appendChild(dot)
    row.appendChild(info)
    row.appendChild(reqs)
    list.appendChild(row)
  })
}

function fmtUptime(ms) {
  const s = Math.floor(ms / 1000)
  if (s < 60) return s + 's'
  if (s < 3600) return Math.floor(s / 60) + 'm'
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm'
}

/* ── Copy helpers ── */
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent
    btn.textContent = 'Copied!'
    btn.classList.add('ok')
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok') }, 1500)
  }).catch(() => {})
}

document.getElementById('copyUrl').addEventListener('click', function() {
  copyText('http://localhost:' + cfg.port + '/v1', this)
})

document.getElementById('copyKey').addEventListener('click', function() {
  const k = document.getElementById('apiKeyInput').value
  if (k) copyText(k, this)
})

/* ── Key generation ── */
document.getElementById('genKeyBtn').addEventListener('click', () => {
  const key = 'sk-contex-' + Array.from(crypto.getRandomValues(new Uint8Array(18)))
    .map(b => b.toString(16).padStart(2, '0')).join('')
  document.getElementById('apiKeyInput').value = key
  cfg.apiKey = key
})

/* ── Enable toggle ── */
document.getElementById('toggleEnabled').addEventListener('change', e => {
  cfg.enabled = e.target.checked
  updateUrlBanner()
  if (cfg.enabled) pollStatus()
  else { clearTimeout(pollTimer); setStopped() }
})

/* ── Port change ── */
document.getElementById('portInput').addEventListener('input', () => {
  cfg.port = parseInt(document.getElementById('portInput').value) || 1337
  updateUrlBanner()
})

/* ── Save ── */
document.getElementById('saveBtn').addEventListener('click', () => {
  readConfig()
  updateUrlBanner()
  renderAllowList()
  saveConfig()
  const btn = document.getElementById('saveBtn')
  btn.textContent = 'Saved!'
  btn.disabled = true
  setTimeout(() => { btn.textContent = 'Save Configuration'; btn.disabled = false }, 1500)
})

/* ── Refresh ── */
document.getElementById('refreshBtn').addEventListener('click', pollStatus)

/* ── Init ── */
applyConfig()
renderConnections([])
})()
</script>
</body>
</html>
