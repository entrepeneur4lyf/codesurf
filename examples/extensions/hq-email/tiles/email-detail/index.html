<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Detail</title>
  <style>
    /* Theme vars injected by host via contex-theme-vars message — light/dark auto */
    :root {
      --ct-bg:        transparent;
      --ct-border:    #e0e0e0;
      --ct-text:      #111111;
      --ct-muted:     #444444;
      --ct-dim:       #666666;
      --ct-panel:     rgba(0,0,0,0.04);
      --ct-hover:     rgba(0,0,0,0.05);
      --ct-accent:    #4f46e5;
      --ct-avatar-bg: rgba(79,70,229,0.12);
    }
    :root {
      --mail-detail-primary: #1f2937;
      --mail-detail-secondary: #334155;
      --mail-detail-tertiary: #64748b;
    }
    html[data-ct-mode="dark"] {
      --mail-detail-primary: #e7eaf0;
      --mail-detail-secondary: #c3cad6;
      --mail-detail-tertiary: #88909c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--ct-bg); color: var(--ct-text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 8px; color: var(--ct-dim); font-size: 13px; }
    .header { padding: 16px 20px; border-bottom: 1px solid var(--ct-border); flex-shrink: 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .back-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--ct-muted); background: none; border: none; cursor: pointer; font-family: inherit; }
    .back-btn:hover { color: var(--ct-text); }
    .theme-btn { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ct-muted); background: var(--ct-panel); border: 1px solid var(--ct-border); border-radius: 5px; padding: 4px 8px; cursor: pointer; font-family: inherit; transition: color 0.15s, background 0.15s; }
    .theme-btn:hover { color: var(--ct-text); background: var(--ct-hover); }
    .theme-btn.light-mode { color: rgba(255,200,80,0.85); border-color: rgba(255,200,80,0.2); background: rgba(255,200,80,0.07); }
    .subject { font-size: 18px; font-weight: 600; color: var(--mail-detail-primary) !important; line-height: 1.3; }
    .meta { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--ct-avatar-bg); color: var(--ct-accent); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .from-name { font-size: 13px; font-weight: 500; color: var(--mail-detail-primary) !important; }
    .meta-detail { font-size: 11px; color: var(--mail-detail-tertiary) !important; }
    .body-wrap { flex: 1; overflow-y: auto; min-height: 0; }
    .body-text { padding: 20px; font-size: 13px; color: var(--mail-detail-secondary) !important; white-space: pre-wrap; line-height: 1.6; font-family: inherit; }
    .body-iframe { width: 100%; height: 100%; border: 0; display: block; }
    #email-view { display: none; flex-direction: column; height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--ct-border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="empty-state" class="empty-state">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.3">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
    <polyline points="22,6 12,13 2,6"/>
  </svg>
  <span id="empty-text">Select an email to read</span>
</div>
<div id="email-view">
  <div class="header">
    <div class="header-top">
      <button class="back-btn" id="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </button>
      <button class="theme-btn" id="theme-btn" title="Toggle email background">
        <svg id="theme-icon-sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="theme-icon-moon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="theme-label">Light</span>
      </button>
    </div>
    <div id="subject" class="subject"></div>
    <div class="meta">
      <div class="avatar" id="avatar"></div>
      <div>
        <div id="from-name" class="from-name"></div>
        <div id="meta-detail" class="meta-detail"></div>
      </div>
    </div>
  </div>
  <div class="body-wrap" id="body-wrap"></div>
</div>

<script>
  var currentId = null
  var currentAccount = ''
  var currentEmail = null
  var lightMode = localStorage.getItem('email-detail-light-mode') === 'true'
  var emailView = document.getElementById('email-view')

  var emptyState = document.getElementById('empty-state')
  var emptyText = document.getElementById('empty-text')
  var themeBtn = document.getElementById('theme-btn')
  var themeLabel = document.getElementById('theme-label')
  var themeIconSun = document.getElementById('theme-icon-sun')
  var themeIconMoon = document.getElementById('theme-icon-moon')

  function applyThemeButton() {
    if (lightMode) {
      themeBtn.classList.add('light-mode')
      themeLabel.textContent = 'Dark'
      themeIconSun.style.display = 'block'
      themeIconMoon.style.display = 'none'
    } else {
      themeBtn.classList.remove('light-mode')
      themeLabel.textContent = 'Light'
      themeIconSun.style.display = 'none'
      themeIconMoon.style.display = 'block'
    }
  }

  applyThemeButton()

  themeBtn.addEventListener('click', function() {
    lightMode = !lightMode
    localStorage.setItem('email-detail-light-mode', lightMode)
    applyThemeButton()
    // Re-render current email body with new theme
    if (currentEmail && currentEmail.bodyHtml) {
      var bodyWrap = document.getElementById('body-wrap')
      var iframe = bodyWrap.querySelector('iframe')
      if (iframe) iframe.srcdoc = makeBodyDoc(currentEmail.bodyHtml)
    }
  })

  function parseFrom(raw) {
    var m = (raw || '').match(/^(.+?)\s*<(.+?)>$/)
    if (m) return { name: m[1].trim(), email: m[2].trim() }
    return { name: raw || '', email: raw || '' }
  }

  function showEmpty(msg) {
    emptyText.textContent = msg || 'Select an email to read'
    emailView.style.display = 'none'
    emptyState.style.display = 'flex'
  }

  function sanitizeEmailHtml(html) {
    // Strip <script> blocks entirely
    html = html.replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '')
    // Strip <style> blocks that could include expression() or -moz-binding attacks
    // but keep them if they're plain — actually keep styles for layout fidelity
    // Strip event handler attributes (onclick, onload, onerror, etc.)
    html = html.replace(/\s+on\w+\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]*)/gi, '')
    // Strip javascript: and data: URIs from href/src/action attributes
    html = html.replace(/(href|src|action)\s*=\s*["']\s*(javascript|data):[^"']*/gi, '$1="#"')
    // Strip <meta> refresh or similar active meta tags
    html = html.replace(/<meta\b[^>]*http-equiv\s*=\s*["']?refresh["']?[^>]*>/gi, '')
    // Strip <form> elements (potential phishing)
    html = html.replace(/<\/?(form|input|button|textarea|select)\b[^>]*>/gi, '')
    return html
  }

  function makeBodyDoc(htmlContent) {
    var safe = sanitizeEmailHtml(htmlContent)
    var fg = lightMode ? '#1a1a1a' : '#d4d4d4'
    var bg = lightMode ? '#ffffff' : '#1e1e1e'
    var subdued = lightMode ? '#475569' : '#a1a1aa'
    var border = lightMode ? 'rgba(15,23,42,0.12)' : 'rgba(255,255,255,0.10)'
    var linkColor = lightMode ? '#4f46e5' : '#818cf8'
    return '<!DOCTYPE html><html><head><meta charset="utf-8"><style>' +
      ':root{color-scheme:' + (lightMode ? 'light' : 'dark') + ';}' +
      '*{margin:0;padding:0;box-sizing:border-box}' +
      'html,body{background:' + bg + ' !important;color:' + fg + ' !important;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;font-size:14px;line-height:1.6}' +
      'body{padding:20px;word-wrap:break-word}' +
      'body,body *{max-width:100%}' +
      'body,body p,body div,body span,body td,body th,body li,body blockquote,body font{color:' + fg + ' !important}' +
      'body pre,body code{color:' + fg + ' !important;background:' + (lightMode ? '#f8fafc' : '#16181d') + ' !important}' +
      'body blockquote{border-left:3px solid ' + border + ';padding-left:12px;color:' + subdued + ' !important}' +
      'body hr{border:none;border-top:1px solid ' + border + ';margin:16px 0}' +
      'img{max-width:100%;height:auto}' +
      'a,a *{color:' + linkColor + ' !important}' +
      'table{max-width:100%;border-collapse:collapse}' +
      '</style></head><body>' + safe + '</body></html>'
  }

  function showEmail(email) {
    currentEmail = email
    var from = parseFrom(email.from)
    document.getElementById('subject').textContent = email.subject || '(No Subject)'
    document.getElementById('avatar').textContent = from.name.charAt(0).toUpperCase()
    document.getElementById('from-name').textContent = from.name
    var toStr = email.to ? 'To: ' + email.to + ' · ' : ''
    document.getElementById('meta-detail').textContent = toStr + (email.date || '')

    var bodyWrap = document.getElementById('body-wrap')
    while (bodyWrap.firstChild) bodyWrap.removeChild(bodyWrap.firstChild)

    if (email.bodyHtml) {
      // Use srcdoc to embed email HTML in an isolated, sandboxed iframe.
      // This is safer than innerHTML and is the standard approach for email rendering.
      var iframe = document.createElement('iframe')
      iframe.className = 'body-iframe'
      iframe.setAttribute('sandbox', 'allow-same-origin')
      iframe.srcdoc = makeBodyDoc(email.bodyHtml)
      bodyWrap.appendChild(iframe)
    } else if (email.body) {
      var textDiv = document.createElement('div')
      textDiv.className = 'body-text'
      textDiv.textContent = email.body
      bodyWrap.appendChild(textDiv)
    } else {
      var emptyDiv = document.createElement('div')
      emptyDiv.className = 'body-text'
      emptyDiv.textContent = 'No content'
      bodyWrap.appendChild(emptyDiv)
    }

    emptyState.style.display = 'none'
    emailView.style.display = 'flex'
  }

  function loadEmail(id) {
    if (!id || !window.contex || !window.contex.ext) return
    showEmpty('Loading...')
    window.contex.ext.invoke('fetchEmail', JSON.stringify({ id: id, account: currentAccount || undefined }))
      .then(function(raw) {
        var data = typeof raw === 'string' ? JSON.parse(raw) : raw
        if (data.email) showEmail(data.email)
        else showEmpty('Failed to load email')
      })
      .catch(function(e) { showEmpty('Error: ' + (e.message || String(e))) })
  }

  document.getElementById('back-btn').addEventListener('click', function() {
    currentId = null
    showEmpty('Select an email to read')
    if (window.contex) window.contex.context.set('ctx:email:selected', null)
  })

  function hydrateFromPeers() {
    if (!window.contex || !window.contex.context || !window.contex.context.getAllPeerContext) return
    window.contex.context.getAllPeerContext('ctx:email:').then(function(map) {
      if (!map) return
      Object.keys(map).forEach(function(peerId) {
        var entries = map[peerId] || []
        if (!Array.isArray(entries)) return
        entries.forEach(function(entry) {
          if (!entry || !entry.key) return
          if (entry.key === 'ctx:email:account' && entry.value) currentAccount = entry.value || ''
          if (entry.key === 'ctx:email:selected' && entry.value && !currentId) currentId = entry.value
        })
      })
      if (currentId) loadEmail(currentId)
    }).catch(function() {})
  }

  function setupListeners() {
    if (!window.contex) return
    window.contex.context.get('ctx:email:selected').then(function(v) {
      if (v) { currentId = v; loadEmail(v) }
      else hydrateFromPeers()
    }).catch(function() { hydrateFromPeers() })

    window.contex.context.get('ctx:email:account').then(function(v) {
      if (v) currentAccount = v
    }).catch(function() {})

    window.contex.context.onPeerContextChanged(function(data) {
      if (data.key === 'ctx:email:account') { currentAccount = data.value || '' }
      else if (data.key === 'ctx:email:selected') {
        currentId = data.value
        if (data.value) loadEmail(data.value)
        else showEmpty('Select an email to read')
      }
    })

    if (window.contex.actions) {
      window.contex.actions.register('showEmail', 'Display a specific email by ID', function(params) {
        if (params && params.id) { currentId = params.id; loadEmail(params.id) }
      })
    }
    // Listen for background email revalidation updates from main.js
    if (window.contex.bus) {
      window.contex.bus.subscribe('hq-email')
      window.addEventListener('message', function(e) {
        if (!e.data || e.data.type !== 'contex-event') return
        if (e.data.event !== 'bus.event.hq-email') return
        var d = e.data.data || {}
        if (d.action === 'emailUpdate' && d.id === currentId && d.email) {
          showEmail(d.email)
        }
      })
    }
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'contex-bridge-ready') setupListeners()
  })
  if (window.contex) setupListeners()
</script>
</body>
</html>
