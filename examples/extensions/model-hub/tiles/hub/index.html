<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Model Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ct-bg: transparent;
      --ct-panel: rgba(0,0,0,0.04);
      --ct-panel-2: rgba(0,0,0,0.06);
      --ct-border: rgba(0,0,0,0.10);
      --ct-text: #111111;
      --ct-muted: #334155;
      --ct-dim: #64748b;
      --ct-accent: #4f46e5;
      --ct-accent-s: rgba(79,70,229,0.12);
      --ct-success: #1f8f5f;
      --ct-warning: #c07b12;
      --ct-danger: #dc2626;
      --bg:        var(--ct-bg);
      --surface:   var(--ct-panel);
      --surface2:  var(--ct-panel-2);
      --border:    var(--ct-border);
      --text:      var(--ct-text);
      --muted:     var(--ct-dim);
      --accent:    var(--ct-accent);
      --accent-bg: var(--ct-accent-s);
      --green:     var(--ct-success);
      --green-bg:  color-mix(in srgb, var(--ct-success) 14%, transparent);
      --amber:     var(--ct-warning);
      --amber-bg:  color-mix(in srgb, var(--ct-warning) 14%, transparent);
      --blue:      var(--ct-accent);
      --blue-bg:   var(--ct-accent-s);
      --red:       var(--ct-danger);
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar-title { font-weight: 600; font-size: 13px; }
    .spacer { flex: 1; }

    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-icon {
      position: absolute; left: 8px;
      color: var(--muted); pointer-events: none;
      width: 14px; height: 14px;
    }
    .search-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      padding: 5px 10px 5px 28px;
      outline: none;
      width: 200px;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: rgba(129,140,248,0.5); }

    /* ── Filter bar ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .filter-label { color: var(--muted); font-size: 11px; }
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 11px;
      font-family: inherit;
      padding: 3px 6px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: rgba(129,140,248,0.5); }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 26px;
    }
    .status-text { color: var(--muted); font-size: 11px; }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
    .status-dot.ok { background: var(--green); }
    .status-dot.err { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* ── Results list ── */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .results::-webkit-scrollbar { width: 4px; }
    .results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Model card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: color-mix(in srgb, var(--accent) 32%, transparent); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .card-id {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      word-break: break-all;
      line-height: 1.3;
    }
    .card-id .author { color: var(--muted); font-weight: 400; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
    }
    .tag-task { background: var(--accent-bg); color: var(--accent); }
    .tag-downloads { background: var(--green-bg); color: var(--green); }
    .tag-likes { background: var(--amber-bg); color: var(--amber); }
    .tag-updated { color: var(--muted); font-size: 10px; }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }
    .btn {
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      padding: 4px 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-use {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .btn-view {
      background: var(--surface2);
      color: var(--ct-muted);
      border: 1px solid var(--border);
    }
    .btn-use.active {
      background: var(--green);
    }

    /* ── Empty / error states ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 24px;
      text-align: center;
    }
    .empty-icon { font-size: 28px; margin-bottom: 4px; }
  </style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <svg class="toolbar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
    <line x1="12" y1="22.08" x2="12" y2="12"/>
  </svg>
  <span class="toolbar-title">Model Hub</span>
  <div class="spacer"></div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" class="search-input" placeholder="Search models..." type="text" />
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <span class="filter-label">Task</span>
  <select id="taskFilter">
    <option value="">All tasks</option>
    <option value="text-generation">Text generation</option>
    <option value="text2text-generation">Text-to-text</option>
    <option value="text-classification">Text classification</option>
    <option value="token-classification">Token classification</option>
    <option value="question-answering">Question answering</option>
    <option value="summarization">Summarization</option>
    <option value="translation">Translation</option>
    <option value="fill-mask">Fill mask</option>
    <option value="sentence-similarity">Sentence similarity</option>
    <option value="feature-extraction">Feature extraction</option>
    <option value="image-classification">Image classification</option>
    <option value="image-to-text">Image to text</option>
    <option value="automatic-speech-recognition">Speech recognition</option>
    <option value="audio-classification">Audio classification</option>
    <option value="zero-shot-classification">Zero-shot</option>
  </select>
  <span class="filter-label">Sort</span>
  <select id="sortBy">
    <option value="downloads">Downloads</option>
    <option value="likes">Likes</option>
    <option value="trending">Trending</option>
    <option value="lastModified">Recently updated</option>
  </select>
  <div class="spacer"></div>
  <span id="resultCount" class="filter-label"></span>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div id="statusDot" class="status-dot"></div>
  <span id="statusText" class="status-text">Ready</span>
</div>

<!-- Results -->
<div id="results" class="results"></div>

<script>
  'use strict'

  const TILE_ID = (new URLSearchParams(location.search)).get('tileId') || 'model-hub'
  const HF_API = 'https://huggingface.co/api/models'
  const HF_BASE = 'https://huggingface.co'

  let bridge = null
  let activeModelId = null
  let searchTimer = null
  let currentQuery = { q: '', task: '', sort: 'downloads' }

  // ── Bridge init ──────────────────────────────────────────────────────────

  function initBridge(b) {
    bridge = b
    bridge.tile.getMeta().then(meta => {
      if (meta?.tileId) currentQuery._tileId = meta.tileId
    }).catch(() => {})
  }

  window.addEventListener('message', e => {
    if (e.data?.type === 'contex-bridge-ready') initBridge(e.data.bridge || window.contex)
    if (e.data?.type === 'contex-action-invoke') handleAction(e.data)
  })
  if (window.contex) initBridge(window.contex)

  // ── Action handler ───────────────────────────────────────────────────────

  function handleAction(msg) {
    if (msg.action === 'search') {
      const { query = '', task = '' } = msg.params || {}
      document.getElementById('searchInput').value = query
      if (task) document.getElementById('taskFilter').value = task
      currentQuery.q = query
      currentQuery.task = task
      doSearch()
    }
    const resultEl = msg.requestId
      ? { type: 'contex-action-result', tileId: TILE_ID, requestId: msg.requestId, result: 'ok' }
      : null
    if (resultEl) window.parent.postMessage(resultEl, '*')
  }

  // ── HuggingFace API ──────────────────────────────────────────────────────

  function buildUrl(q, task, sort) {
    const params = new URLSearchParams()
    if (q) params.set('search', q)
    if (task) params.set('filter', task)
    params.set('sort', sort)
    params.set('direction', '-1')
    params.set('limit', '30')
    params.set('full', 'false')
    return HF_API + '?' + params.toString()
  }

  async function doSearch() {
    const q = currentQuery.q.trim()
    const task = currentQuery.task
    const sort = currentQuery.sort

    setStatus('loading', 'Fetching...')

    try {
      const res = await fetch(buildUrl(q, task, sort))
      if (!res.ok) throw new Error('HTTP ' + res.status)
      const models = await res.json()
      renderResults(models)
      setStatus('ok', models.length + ' models')
      document.getElementById('resultCount').textContent = models.length + ' results'
    } catch (err) {
      setStatus('err', 'Failed: ' + err.message)
      showEmpty('Could not reach HuggingFace API.\n' + err.message)
    }
  }

  // ── Render ───────────────────────────────────────────────────────────────

  function fmtNum(n) {
    if (!n) return '0'
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M'
    if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k'
    return String(n)
  }

  function fmtDate(iso) {
    if (!iso) return ''
    const d = new Date(iso)
    const now = new Date()
    const diffDays = Math.floor((now - d) / 86400000)
    if (diffDays === 0) return 'today'
    if (diffDays === 1) return 'yesterday'
    if (diffDays < 30) return diffDays + 'd ago'
    if (diffDays < 365) return Math.floor(diffDays / 30) + 'mo ago'
    return Math.floor(diffDays / 365) + 'y ago'
  }

  function renderResults(models) {
    const container = document.getElementById('results')
    while (container.firstChild) container.removeChild(container.firstChild)

    if (!models.length) {
      showEmpty('No models found.\nTry a different search or filter.')
      return
    }

    models.forEach(model => {
      const card = buildCard(model)
      container.appendChild(card)
    })
  }

  function buildCard(model) {
    const modelId = model.id || model.modelId || ''
    const author = modelId.includes('/') ? modelId.split('/')[0] : ''
    const name = modelId.includes('/') ? modelId.split('/').slice(1).join('/') : modelId
    const task = model.pipeline_tag || ''
    const downloads = model.downloads || 0
    const likes = model.likes || 0
    const updated = model.lastModified || ''
    const isActive = modelId === activeModelId

    const card = document.createElement('div')
    card.className = 'card'

    // Header
    const header = document.createElement('div')
    header.className = 'card-header'

    const idEl = document.createElement('div')
    idEl.className = 'card-id'
    if (author) {
      const authorSpan = document.createElement('span')
      authorSpan.className = 'author'
      authorSpan.textContent = author + '/'
      idEl.appendChild(authorSpan)
    }
    idEl.appendChild(document.createTextNode(name))
    header.appendChild(idEl)
    card.appendChild(header)

    // Meta tags
    const meta = document.createElement('div')
    meta.className = 'card-meta'

    if (task) {
      const taskTag = document.createElement('span')
      taskTag.className = 'tag tag-task'
      taskTag.textContent = task
      meta.appendChild(taskTag)
    }

    const dlTag = document.createElement('span')
    dlTag.className = 'tag tag-downloads'
    dlTag.textContent = fmtNum(downloads) + ' dl'
    meta.appendChild(dlTag)

    if (likes > 0) {
      const likesTag = document.createElement('span')
      likesTag.className = 'tag tag-likes'
      likesTag.textContent = fmtNum(likes) + ' likes'
      meta.appendChild(likesTag)
    }

    if (updated) {
      const updTag = document.createElement('span')
      updTag.className = 'tag tag-updated'
      updTag.textContent = fmtDate(updated)
      meta.appendChild(updTag)
    }

    card.appendChild(meta)

    // Actions
    const actions = document.createElement('div')
    actions.className = 'card-actions'

    const useBtn = document.createElement('button')
    useBtn.className = isActive ? 'btn btn-use active' : 'btn btn-use'
    useBtn.textContent = isActive ? 'Active' : 'Use'
    useBtn.dataset.modelId = modelId
    useBtn.dataset.name = name
    useBtn.dataset.task = task
    useBtn.addEventListener('click', () => selectModel(modelId, name, task, useBtn))
    actions.appendChild(useBtn)

    const viewBtn = document.createElement('button')
    viewBtn.className = 'btn btn-view'
    viewBtn.textContent = 'View on HF'
    viewBtn.addEventListener('click', () => {
      window.open(HF_BASE + '/' + modelId, '_blank')
    })
    actions.appendChild(viewBtn)

    card.appendChild(actions)
    return card
  }

  function showEmpty(msg) {
    const container = document.getElementById('results')
    while (container.firstChild) container.removeChild(container.firstChild)
    const empty = document.createElement('div')
    empty.className = 'empty'
    const icon = document.createElement('div')
    icon.className = 'empty-icon'
    icon.textContent = '[]'
    const text = document.createElement('div')
    text.textContent = msg
    empty.appendChild(icon)
    empty.appendChild(text)
    container.appendChild(empty)
  }

  // ── Select model ─────────────────────────────────────────────────────────

  function selectModel(modelId, name, task, btn) {
    activeModelId = modelId

    // Update all use buttons
    document.querySelectorAll('.btn-use').forEach(b => {
      b.textContent = 'Use'
      b.classList.remove('active')
    })
    btn.textContent = 'Active'
    btn.classList.add('active')

    const payload = { modelId, name, task, source: 'model-hub' }

    // Publish to context
    if (bridge) {
      bridge.context.set('ctx:model-hub:selected', payload).catch(() => {})

      // Try to forward to any connected local-models peer via setModel action
      bridge.tile.getMeta().then(meta => {
        const peers = meta?.connectedPeers || []
        peers.forEach(peerId => {
          bridge.actions.invoke(peerId, 'setModel', { modelId, name }).catch(() => {})
        })
      }).catch(() => {})
    }
  }

  // ── Status ───────────────────────────────────────────────────────────────

  function setStatus(state, msg) {
    const dot = document.getElementById('statusDot')
    const text = document.getElementById('statusText')
    dot.className = 'status-dot ' + state
    text.textContent = msg
  }

  // ── Wire up controls ─────────────────────────────────────────────────────

  document.getElementById('searchInput').addEventListener('input', e => {
    currentQuery.q = e.target.value
    clearTimeout(searchTimer)
    searchTimer = setTimeout(doSearch, 400)
  })

  document.getElementById('taskFilter').addEventListener('change', e => {
    currentQuery.task = e.target.value
    doSearch()
  })

  document.getElementById('sortBy').addEventListener('change', e => {
    currentQuery.sort = e.target.value
    doSearch()
  })

  // Initial load — top downloads, no filter
  doSearch()
</script>
</body>
</html>
