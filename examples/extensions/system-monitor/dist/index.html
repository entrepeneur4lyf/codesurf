<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--ct-bg, transparent);
    color: var(--ct-text, #111);
    padding: 16px;
    font-size: 12px;
    overflow-y: auto;
    height: 100vh;
  }
  .section { margin-bottom: 16px; }
  .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ct-dim, #64748b);
    margin-bottom: 6px;
  }
  .meter {
    height: 8px;
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .meter-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .meter-fill.cpu { background: linear-gradient(90deg, var(--ct-accent, #4f46e5), var(--ct-danger, #dc2626)); }
  .meter-fill.mem { background: linear-gradient(90deg, var(--ct-success, #1f8f5f), var(--ct-warning, #c07b12)); }
  .value { font-variant-numeric: tabular-nums; color: var(--ct-muted, #334155); font-size: 11px; }
  .cores { display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); gap: 3px; margin-top: 6px; }
  .core { height: 20px; border-radius: 3px; position: relative; overflow: hidden; background: var(--ct-panel-2, rgba(0,0,0,.06)); }
  .core-fill { position: absolute; bottom: 0; left: 0; right: 0; transition: height 0.5s ease; border-radius: 3px; }
  .info-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--ct-border, rgba(0,0,0,.1)); }
  .info-row .k { color: var(--ct-dim, #64748b); }
  .info-row .v { color: var(--ct-muted, #334155); font-variant-numeric: tabular-nums; }
  .waiting { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--ct-dim, #64748b); }
</style>
</head>
<body>

<div id="waiting" class="waiting">Waiting for system data…</div>

<div id="dashboard" style="display: none;">
  <div class="section">
    <div class="label">CPU</div>
    <div class="meter"><div id="cpuFill" class="meter-fill cpu" style="width: 0%"></div></div>
    <div class="value"><span id="cpuVal">0</span>%</div>
    <div id="cores" class="cores"></div>
  </div>

  <div class="section">
    <div class="label">Memory</div>
    <div class="meter"><div id="memFill" class="meter-fill mem" style="width: 0%"></div></div>
    <div class="value"><span id="memVal">0</span>% — <span id="memDetail">0 / 0 GB</span></div>
  </div>

  <div class="section">
    <div class="label">System</div>
    <div id="sysInfo"></div>
  </div>
</div>

<script>
  const cpuFill = document.getElementById('cpuFill')
  const cpuVal = document.getElementById('cpuVal')
  const memFill = document.getElementById('memFill')
  const memVal = document.getElementById('memVal')
  const memDetail = document.getElementById('memDetail')
  const coresEl = document.getElementById('cores')
  const sysInfo = document.getElementById('sysInfo')
  const waiting = document.getElementById('waiting')
  const dashboard = document.getElementById('dashboard')

  function css(name, fallback) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback }
  function cpuColor(pct) {
    if (pct < 40) return css('--ct-accent', '#4f46e5')
    if (pct < 70) return css('--ct-warning', '#c07b12')
    return css('--ct-danger', '#dc2626')
  }

  function update(stats) {
    waiting.style.display = 'none'
    dashboard.style.display = 'block'

    cpuFill.style.width = stats.cpuAvg + '%'
    cpuVal.textContent = stats.cpuAvg

    memFill.style.width = stats.memPercent + '%'
    memVal.textContent = stats.memPercent
    memDetail.textContent = stats.memUsedGB + ' / ' + stats.memTotalGB + ' GB'

    if (stats.cpuCores) {
      if (coresEl.children.length !== stats.cpuCores.length) {
        coresEl.innerHTML = stats.cpuCores.map(() => '<div class="core"><div class="core-fill"></div></div>').join('')
      }
      stats.cpuCores.forEach((pct, i) => {
        const fill = coresEl.children[i]?.querySelector('.core-fill')
        if (fill) {
          fill.style.height = pct + '%'
          fill.style.background = cpuColor(pct)
        }
      })
    }

    function fmtUptime(s) {
      const h = Math.floor(s / 3600)
      const m = Math.floor((s % 3600) / 60)
      return h + 'h ' + m + 'm'
    }
    const rows = [
      ['Hostname', stats.hostname],
      ['Platform', stats.platform + ' / ' + stats.arch],
      ['Uptime', fmtUptime(stats.uptime)],
      ['Load Avg', (stats.loadAvg || []).join(', ')],
    ]
    sysInfo.innerHTML = rows.map(([k, v]) =>
      '<div class="info-row"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>'
    ).join('')
  }

  function listen() {
    if (!window.contex) return
    window.contex.bus.subscribe('sysmon', (event) => {
      if (event?.payload) update(event.payload)
    })
  }

  if (window.contex) listen()
  else {
    window.addEventListener('message', function handler(e) {
      if (e.data?.type === 'contex-bridge-ready') {
        window.removeEventListener('message', handler)
        setTimeout(listen, 100)
      }
    })
  }
</script>
</body>
</html>
