<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: var(--ct-bg, transparent);
    color: var(--ct-text, #111);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
    user-select: none;
  }
  .display {
    font-size: 48px;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    margin-bottom: 24px;
    color: var(--ct-text, #111);
  }
  .controls { display: flex; gap: 10px; }
  button {
    padding: 8px 20px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    color: var(--ct-text, #111);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { background: var(--ct-hover, rgba(0,0,0,.06)); border-color: var(--ct-accent, #4f46e5); }
  button.active { background: var(--ct-accent, #4f46e5); border-color: var(--ct-accent, #4f46e5); color: #fff; }
  .presets { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
  .presets button { padding: 4px 12px; font-size: 11px; }
  .done { animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { color: var(--ct-text, #111); }
    50% { color: var(--ct-accent, #4f46e5); }
  }
</style>
</head>
<body>

<div class="presets">
  <button onclick="setTimer(60)">1m</button>
  <button onclick="setTimer(300)">5m</button>
  <button onclick="setTimer(600)">10m</button>
  <button onclick="setTimer(1500)">25m</button>
  <button onclick="setTimer(3600)">1h</button>
</div>

<div id="display" class="display">00:00</div>

<div class="controls">
  <button id="startBtn" onclick="toggleTimer()">Start</button>
  <button class="reset" onclick="resetTimer()">Reset</button>
</div>

<script>
  let seconds = 0
  let remaining = 0
  let running = false
  let interval = null
  let done = false

  const display = document.getElementById('display')
  const startBtn = document.getElementById('startBtn')

  function fmt(s) {
    const m = Math.floor(s / 60)
    const sec = s % 60
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0')
  }

  function render() {
    display.textContent = fmt(remaining)
    display.className = done ? 'display done' : 'display'
    startBtn.textContent = running ? 'Pause' : 'Start'
    startBtn.className = running ? 'active' : ''
  }

  function setTimer(s) {
    seconds = s
    remaining = s
    running = false
    done = false
    if (interval) clearInterval(interval)
    interval = null
    render()
    save()
  }

  function toggleTimer() {
    if (done) { resetTimer(); return }
    if (remaining <= 0) return
    running = !running
    if (running) interval = setInterval(tick, 1000)
    else { clearInterval(interval); interval = null }
    render()
    save()
  }

  function tick() {
    remaining--
    if (remaining <= 0) {
      remaining = 0
      running = false
      done = true
      clearInterval(interval)
      interval = null
      if (window.contex) {
        window.contex.bus.publish('timer', 'notification', { message: 'Timer complete!', duration: seconds })
      }
    }
    render()
    save()
  }

  function resetTimer() {
    remaining = seconds
    running = false
    done = false
    if (interval) clearInterval(interval)
    interval = null
    render()
    save()
  }

  function save() {
    if (window.contex) window.contex.tile.setState({ seconds, remaining, running, done })
  }

  if (window.contex) {
    window.contex.tile.getState().then(state => {
      if (state && state.seconds) {
        seconds = state.seconds
        remaining = state.remaining ?? state.seconds
        done = state.done ?? false
        if (state.running && remaining > 0) {
          running = true
          interval = setInterval(tick, 1000)
        }
        render()
      }
    })
  } else {
    window.addEventListener('message', function handler(e) {
      if (e.data?.type === 'contex-bridge-ready') {
        window.removeEventListener('message', handler)
        setTimeout(() => {
          if (window.contex) {
            window.contex.tile.getState().then(state => {
              if (state && state.seconds) {
                seconds = state.seconds
                remaining = state.remaining ?? state.seconds
                render()
              }
            })
          }
        }, 100)
      }
    })
  }

  render()
</script>
</body>
</html>
